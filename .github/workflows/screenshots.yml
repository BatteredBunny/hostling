name: "PR Screenshots"
on:
  pull_request:
    branches: [ main ]
jobs:
  screenshots:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build screenshots
        run: |
          out=$(nix build .#example-screenshots --print-out-paths)
          mkdir -p /tmp/screenshots
          cp "$out"/screenshots/*.png /tmp/screenshots/

      - name: Upload screenshots to Litterbox
        id: upload
        run: |
          for img in upload gallery modal admin; do
            url=$(curl -F "reqtype=fileupload" -F "time=72h" -F "fileToUpload=@/tmp/screenshots/${img}.png" https://litterbox.catbox.moe/resources/internals/api.php)
            echo "${img}=${url}" >> "$GITHUB_OUTPUT"
          done

      - name: Find existing comment
        uses: peter-evans/find-comment@v4
        id: find
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "## Screenshots"

      - name: Post or update PR comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ## Screenshots

            Built from ${{ github.event.pull_request.head.sha }}

            | Main page | Library view |
            |:-:|:-:|
            | ![upload](${{ steps.upload.outputs.upload }}) | ![gallery](${{ steps.upload.outputs.gallery }}) |

            | File modal | Admin panel |
            |:-:|:-:|
            | ![modal](${{ steps.upload.outputs.modal }}) | ![admin](${{ steps.upload.outputs.admin }}) |

            <sub>Images expire after 72 hours. Re-run the workflow to regenerate.</sub>
