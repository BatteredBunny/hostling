services:
  hostling:
    container_name: hostling
    build: .
    image: batteredbunny/hostling:latest
    environment:
      TZ: Etc/UTC
    ports:
      - "8080:80"
    volumes:
      - hostling-data:/app/data
      - ./examples/example_docker.toml:/app/config.toml:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    container_name: postgres_hostling
    image: postgres:18-alpine
    environment:
      POSTGRES_PASSWORD: "123"
      POSTGRES_USER: postgres
      POSTGRES_DB: hostling
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hostling"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  hostling-data:
  postgres-data:
